name: Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    name: Deploy to Staging
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Calculate staging port
        id: vars
        run: echo "port=$((8100 + ${{ github.event.number }}))" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PORT: ${{ steps.vars.outputs.port }}
          STAGING_BASE_DIR: ${{ vars.DO_STAGING_BASE_DIR }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.SUPERUSER_PASSWORD }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GITHUB_TOKEN,PR_NUM,PR_BRANCH,PORT,STAGING_BASE_DIR,DJANGO_SUPERUSER_EMAIL,DJANGO_SUPERUSER_PASSWORD
          script: |
            STAGING_DIR="${STAGING_BASE_DIR}/pr-${PR_NUM}"
            PG_PORT=$((5500 + PR_NUM))
            PROJECT="brainspread_pr_${PR_NUM}"
            VOLUME="${PROJECT}_postgres"
            REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/steezeburger/brainspread.git"

            if [ -d "$STAGING_DIR/.git" ]; then
              git -C "$STAGING_DIR" fetch origin
              git -C "$STAGING_DIR" checkout "$PR_BRANCH"
              git -C "$STAGING_DIR" reset --hard "origin/$PR_BRANCH"
            else
              mkdir -p "$STAGING_BASE_DIR"
              git clone "$REPO" "$STAGING_DIR"
              git -C "$STAGING_DIR" checkout "$PR_BRANCH"
            fi

            cd "$STAGING_DIR/packages/django-app"

            # Only generate secrets on first deploy for this PR
            if [ ! -f .env ]; then
              SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(38))")
              DB_PASSWORD=$(openssl rand -hex 32)
              cat > .env << EOF
            POSTGRES_HOST=db
            POSTGRES_PASSWORD=${DB_PASSWORD}
            POSTGRES_DB=${PROJECT}
            POSTGRES_USER=postgres
            POSTGRES_PORT=${PG_PORT}
            POSTGRES_VOLUME_NAME=${VOLUME}
            WEB_PORT=${PORT}
            DEBUG=True
            ALLOWED_HOSTS=*
            DJANGO_SECRET_KEY=${SECRET_KEY}
            COMPOSE_PROJECT_NAME=${PROJECT}
            EOF
            fi

            docker volume create --name="${VOLUME}" 2>/dev/null || true
            just staging-up
            sleep 5
            just staging-migrate
            just staging-create-superuser
            just staging-seed

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.number }}
          comment-author: github-actions[bot]
          body-includes: Staging Environment

      - name: Post staging comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.number }}
          edit-mode: replace
          body: |
            ### Staging Environment

            | | |
            |---|---|
            | **URL** | http://${{ vars.DO_STAGING_HOST }}:${{ steps.vars.outputs.port }}/knowledge/ |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Status** | Deployed |

  teardown:
    name: Teardown Staging
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Teardown staging on VPS
        uses: appleboy/ssh-action@v1
        env:
          PR_NUM: ${{ github.event.number }}
          STAGING_BASE_DIR: ${{ vars.DO_STAGING_BASE_DIR }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: PR_NUM,STAGING_BASE_DIR
          script: |
            STAGING_DIR="${STAGING_BASE_DIR}/pr-${PR_NUM}"
            PROJECT="brainspread_pr_${PR_NUM}"
            VOLUME="${PROJECT}_postgres"

            if [ -d "$STAGING_DIR/packages/django-app" ]; then
              cd "$STAGING_DIR/packages/django-app"
              just staging-down
            fi

            docker volume rm "${VOLUME}" 2>/dev/null || true
            rm -rf "$STAGING_DIR"

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.number }}
          comment-author: github-actions[bot]
          body-includes: Staging Environment

      - name: Update comment on teardown
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ### Staging Environment

            | | |
            |---|---|
            | **Branch** | `${{ github.head_ref }}` |
            | **Status** | Torn down (PR closed) |
