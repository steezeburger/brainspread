name: Nightly Database Backup

on:
  schedule:
    # 09:17 UTC daily (~2:17am PT). Odd minute to avoid the top-of-hour
    # thundering herd on GitHub's cron scheduler.
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: Backup Production Database
    runs-on: ubuntu-latest
    environment: ci
    steps:
      # Layer 1: compressed pg_dump kept on the VPS, pruned after 14 days.
      - name: Run backup on VPS
        uses: appleboy/ssh-action@v1
        env:
          PROD_DIR: ${{ vars.DO_PROD_DIR }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: PROD_DIR
          script: |
            set -euo pipefail
            cd "$PROD_DIR/packages/django-app"
            just backup

      # Layer 2: copy the fresh dump off the VPS and keep it as a GitHub
      # Actions artifact so a dead disk doesn't take the backups with it.
      - name: Set up SSH for download
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          SSH_HOST: ${{ secrets.DO_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Download latest dump from VPS
        env:
          PROD_DIR: ${{ vars.DO_PROD_DIR }}
          SSH_HOST: ${{ secrets.DO_SSH_HOST }}
          SSH_USER: ${{ secrets.DO_SSH_USER }}
        run: |
          set -euo pipefail
          latest=$(ssh -i ~/.ssh/backup_key "$SSH_USER@$SSH_HOST" \
            "ls -t '$PROD_DIR'/packages/django-app/backups/*-brainspread-dump.sql.gz | head -1")
          scp -i ~/.ssh/backup_key "$SSH_USER@$SSH_HOST:$latest" .
          gzip -t ./*-brainspread-dump.sql.gz
          ls -lh ./*-brainspread-dump.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: brainspread-db-backup-${{ github.run_id }}
          path: "*-brainspread-dump.sql.gz"
          retention-days: 30
          if-no-files-found: error
