name: brainspread

volumes:
  postgres_volume:
    name: ${POSTGRES_VOLUME_NAME:-brainspread_postgres}
    external: true

services:
  db:
    image: postgres:15.4
    env_file:
      - ./.env
    environment:
      - PGPORT=${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_volume:/var/lib/postgresql/data/
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - POSTGRES_HOST=db
      - STATIC_ROOT=/code/app/static/
      - MEDIA_ROOT=/code/app/media/
    command:
      - "/code/bin/wait-for-it.sh"
      - "db:${POSTGRES_PORT:-5432}"
      - "--"
      - "python"
      - "/code/app/manage.py"
      - "runserver"
      - "0.0.0.0:${WEB_PORT:-8000}"
    volumes:
      - .:/code
    depends_on:
      - db
  # Periodic task runner — polls the reminders table once a minute and
  # dispatches any that are due. See bin/run-scheduler.sh and issue #59.
  # REMINDERS_ENABLED defaults to true; set to false to mute. Non-prod
  # environments get an `[<env>]` label on each message via ENVIRONMENT.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - POSTGRES_HOST=db
    command:
      - "/code/bin/wait-for-it.sh"
      - "db:${POSTGRES_PORT:-5432}"
      - "--"
      - "/code/bin/run-scheduler.sh"
    volumes:
      - .:/code
    depends_on:
      - db
    restart: unless-stopped
