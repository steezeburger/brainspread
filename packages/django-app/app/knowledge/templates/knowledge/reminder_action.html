{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>{{ title|default:"Reminder action" }} · brainspread</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #1f2937;
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        max-width: 28rem;
        width: 100%;
        padding: 2rem;
        border: 1px solid #e5e7eb;
        border-radius: 3px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .card h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      .card p {
        margin: 0 0 1.5rem;
        line-height: 1.4;
        color: #374151;
      }
      .card a {
        display: inline-block;
        padding: 0.5rem 0.875rem;
        background: #6366f1;
        color: #fff;
        text-decoration: none;
        border-radius: 3px;
        font-size: 0.9rem;
      }
      .card a:hover {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{ title }}</h1>
      <p>{{ message }}</p>
      {% if block_url %}
        <a href="{{ block_url }}">Open block</a>
      {% endif %}
    </main>
  </body>
</html>
