<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>authorization error - brainspread</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      padding: 1rem;
    }
    .error-card {
      width: 100%;
      max-width: 26rem;
      background: #242424;
      border: 3px solid #ff5555;
      box-shadow: 4px 4px 0 #ff5555;
      border-radius: 0;
      padding: 1.5rem;
    }
    h1 { margin: 0 0 0.75rem; font-size: 1.1rem; text-transform: lowercase; }
    p { margin: 0.25rem 0; font-size: 0.9rem; color: #999999; }
  </style>
</head>
<body>
  <div class="error-card">
    <h1>authorization request rejected</h1>
    {% for error in errors %}
    <p>{{ error }}</p>
    {% endfor %}
  </div>
</body>
</html>
